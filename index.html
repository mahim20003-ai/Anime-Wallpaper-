<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Anime Wallpaper - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1f;
            color: #eef5ff;
            min-height: 100vh;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3a 100%);
            padding: 20px;
        }

        .login-box {
            background: rgba(20, 18, 45, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFB8D1, #A155FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-box p {
            color: #a7a2c9;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            background: #1e1b2f;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }

        .login-input:focus {
            border-color: #ff6b9d;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b9d, #a155ff);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
        }

        .admin-header {
            background: linear-gradient(135deg, #0f0c2c, #1a1a3a);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: rgba(255,107,157,0.2);
            border: 1px solid #ff6b9d;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffb8d1;
            cursor: pointer;
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #12102b;
            margin: 20px;
            border-radius: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #1e1b2f;
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ff9fcc;
        }

        /* Form */
        .add-wallpaper-section {
            background: #12102b;
            margin: 20px;
            padding: 20px;
            border-radius: 24px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cdc9f0;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #1e1b2f;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: #ff6b9d;
        }

        .submit-btn {
            background: linear-gradient(135deg, #ff6b9d, #a155ff);
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Wallpaper List */
        .wallpaper-list {
            margin: 20px;
        }

        .wallpaper-grid-admin {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .admin-card {
            background: #12102b;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            gap: 15px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-card img {
            width: 80px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .admin-card-info {
            flex: 1;
        }

        .admin-card-info h4 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .admin-card-info p {
            font-size: 0.75rem;
            color: #a7a2c9;
            margin-bottom: 8px;
        }

        .admin-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .edit-btn {
            background: #2a5f8a;
            color: white;
        }

        .delete-btn {
            background: #b91c1c;
            color: white;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: #12102b;
            padding: 25px;
            border-radius: 28px;
            width: 90%;
            max-width: 450px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1100;
            display: none;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .admin-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .admin-card img {
                width: 100%;
                height: 160px;
            }
        }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="loginContainer" class="login-container">
    <div class="login-box">
        <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
        <p>Enter password to manage wallpapers</p>
        <input type="password" id="adminPassword" class="login-input" placeholder="Password">
        <button onclick="checkLogin()" class="login-btn">Access Panel</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <h2><i class="fas fa-dragon"></i> Anime Wallpaper Admin</h2>
        <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="stats" id="statsContainer"></div>

    <div class="add-wallpaper-section">
        <div class="section-title">
            <i class="fas fa-plus-circle" style="color: #ff6b9d;"></i>
            <span>Add New Wallpaper</span>
        </div>
        <form id="addWallpaperForm">
            <div class="form-group">
                <label>Title (Anime/Character Name)</label>
                <input type="text" id="wallTitle" required placeholder="e.g., Naruto Uzumaki">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="wallCategory">
                    <option value="shonen">⚡ Shonen</option>
                    <option value="fantasy">🌙 Fantasy</option>
                    <option value="aesthetic">🌸 Aesthetic</option>
                    <option value="cyberpunk">🌀 Cyberpunk</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" id="wallTags" required placeholder="naruto, rasengan, anime">
            </div>
            <div class="form-group">
                <label>Image URL (high quality, 9:16 ratio recommended)</label>
                <input type="url" id="wallImageUrl" required placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Download URL (same or high-res)</label>
                <input type="url" id="wallDownloadUrl" required placeholder="https://...">
            </div>
            <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Add Wallpaper</button>
        </form>
    </div>

    <div class="wallpaper-list">
        <div class="section-title">
            <i class="fas fa-images"></i>
            <span>All Wallpapers (<span id="wallCount">0</span>)</span>
        </div>
        <div id="adminWallpaperGrid" class="wallpaper-grid-admin"></div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-edit"></i> Edit Wallpaper</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="editTitle" class="login-input">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="editCategory" class="login-input">
                <option value="shonen">Shonen</option>
                <option value="fantasy">Fantasy</option>
                <option value="aesthetic">Aesthetic</option>
                <option value="cyberpunk">Cyberpunk</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tags</label>
            <input type="text" id="editTags" class="login-input">
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="editImageUrl" class="login-input">
        </div>
        <div class="form-group">
            <label>Download URL</label>
            <input type="url" id="editDownloadUrl" class="login-input">
        </div>
        <div class="modal-buttons">
            <button onclick="closeEditModal()" class="delete-btn">Cancel</button>
            <button onclick="saveEdit()" class="edit-btn">Save Changes</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">✓ Success</div>

<script>
    // Default wallpapers data (same as main site)
    let wallpapers = [
        { id: 1, title: "Naruto Uzumaki", category: "shonen", tags: "naruto, rasengan", imageUrl: "https://images.pexels.com/photos/1303071/pexels-photo-1303071.jpeg?auto=compress&cs=tinysrgb&w=600&h=900&fit=crop", downloadUrl: "https://images.pexels.com/photos/1303071/pexels-photo-1303071.jpeg?auto=compress&cs=tinysrgb&w=1080&h=1920&fit=crop" },
        { id: 2, title: "Sukuna Domain", category: "shonen", tags: "jujutsu kaisen, sukuna", imageUrl: "https://images.pexels.com/photos/1191710/pexels-photo-1191710.jpeg?auto=compress&cs=tinysrgb&w=600&h=900&fit=crop", downloadUrl: "https://images.pexels.com/photos/1191710/pexels-photo-1191710.jpeg?auto=compress&cs=tinysrgb&w=1080&h=1920&fit=crop" },
        { id: 3, title: "Spirited Away", category: "fantasy", tags: "ghibli, spirited away, chihiro", imageUrl: "https://images.pexels.com/photos/1756952/pexels-photo-1756952.jpeg?auto=compress&cs=tinysrgb&w=600&h=900&fit=crop", downloadUrl: "https://images.pexels.com/photos/1756952/pexels-photo-1756952.jpeg?auto=compress&cs=tinysrgb&w=1080&h=1920&fit=crop" },
        { id: 4, title: "Samurai Champloo", category: "aesthetic", tags: "samurai, sunset, vibe", imageUrl: "https://images.pexels.com/photos/1194420/pexels-photo-1194420.jpeg?auto=compress&cs=tinysrgb&w=600&h=900&fit=crop", downloadUrl: "https://images.pexels.com/photos/1194420/pexels-photo-1194420.jpeg?auto=compress&cs=tinysrgb&w=1080&h=1920&fit=crop" },
        { id: 5, title: "Cyberpunk 2077", category: "cyberpunk", tags: "neon, tokyo, futuristic", imageUrl: "https://images.pexels.com/photos/1252869/pexels-photo-1252869.jpeg?auto=compress&cs=tinysrgb&w=600&h=900&fit=crop", downloadUrl: "https://images.pexels.com/photos/1252869/pexels-photo-1252869.jpeg?auto=compress&cs=tinysrgb&w=1080&h=1920&fit=crop" }
    ];

    let nextId = 6;

    // Load data from localStorage
    function loadData() {
        const saved = localStorage.getItem('animeWallpapers');
        if(saved) {
            wallpapers = JSON.parse(saved);
            if(wallpapers.length > 0) {
                nextId = Math.max(...wallpapers.map(w => w.id)) + 1;
            } else {
                nextId = 1;
            }
        } else {
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('animeWallpapers', JSON.stringify(wallpapers));
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    // Render admin wallpaper list
    function renderAdminList() {
        const container = document.getElementById('adminWallpaperGrid');
        const countSpan = document.getElementById('wallCount');
        if(!container) return;
        
        if(wallpapers.length === 0) {
            container.innerHTML = '<div style="padding:40px;text-align:center;">No wallpapers yet. Add some!</div>';
            if(countSpan) countSpan.innerText = '0';
            return;
        }
        
        let html = '';
        wallpapers.forEach(w => {
            html += `
                <div class="admin-card" data-id="${w.id}">
                    <img src="${w.imageUrl}" alt="${w.title}" onerror="this.src='https://placehold.co/400x600?text=Anime'">
                    <div class="admin-card-info">
                        <h4>${escapeHtml(w.title)}</h4>
                        <p><i class="fas fa-tag"></i> ${w.category} | <i class="fas fa-hashtag"></i> ${w.tags}</p>
                        <div class="admin-card-actions">
                            <button onclick="openEditModal(${w.id})" class="edit-btn"><i class="fas fa-pen"></i> Edit</button>
                            <button onclick="deleteWallpaper(${w.id})" class="delete-btn"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        if(countSpan) countSpan.innerText = wallpapers.length;
        
        // update stats
        const statsHtml = `
            <div class="stat-card"><div class="stat-number">${wallpapers.length}</div><div>Total Wallpapers</div></div>
            <div class="stat-card"><div class="stat-number">${wallpapers.filter(w => w.category === 'shonen').length}</div><div>Shonen</div></div>
            <div class="stat-card"><div class="stat-number">${wallpapers.filter(w => w.category === 'fantasy').length}</div><div>Fantasy</div></div>
            <div class="stat-card"><div class="stat-number">${wallpapers.filter(w => w.category === 'aesthetic').length}</div><div>Aesthetic</div></div>
        `;
        document.getElementById('statsContainer').innerHTML = statsHtml;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Add new wallpaper
    document.getElementById('addWallpaperForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const title = document.getElementById('wallTitle').value.trim();
        const category = document.getElementById('wallCategory').value;
        const tags = document.getElementById('wallTags').value.trim();
        const imageUrl = document.getElementById('wallImageUrl').value.trim();
        const downloadUrl = document.getElementById('wallDownloadUrl').value.trim();
        
        if(!title || !imageUrl || !downloadUrl) {
            showToast('Please fill all fields');
            return;
        }
        
        const newWall = {
            id: nextId++,
            title: title,
            category: category,
            tags: tags,
            imageUrl: imageUrl,
            downloadUrl: downloadUrl
        };
        
        wallpapers.push(newWall);
        saveData();
        renderAdminList();
        document.getElementById('addWallpaperForm').reset();
        showToast('✓ Wallpaper added successfully!');
    });
    
    // Delete wallpaper
    window.deleteWallpaper = function(id) {
        if(confirm('Are you sure you want to delete this wallpaper?')) {
            wallpapers = wallpapers.filter(w => w.id !== id);
            saveData();
            renderAdminList();
            showToast('🗑️ Wallpaper deleted');
        }
    };
    
    let currentEditId = null;
    window.openEditModal = function(id) {
        const wall = wallpapers.find(w => w.id === id);
        if(!wall) return;
        currentEditId = id;
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = wall.title;
        document.getElementById('editCategory').value = wall.category;
        document.getElementById('editTags').value = wall.tags;
        document.getElementById('editImageUrl').value = wall.imageUrl;
        document.getElementById('editDownloadUrl').value = wall.downloadUrl;
        document.getElementById('editModal').classList.add('active');
    };
    
    window.closeEditModal = function() {
        document.getElementById('editModal').classList.remove('active');
        currentEditId = null;
    };
    
    window.saveEdit = function() {
        const id = parseInt(document.getElementById('editId').value);
        const index = wallpapers.findIndex(w => w.id === id);
        if(index !== -1) {
            wallpapers[index] = {
                ...wallpapers[index],
                title: document.getElementById('editTitle').value,
                category: document.getElementById('editCategory').value,
                tags: document.getElementById('editTags').value,
                imageUrl: document.getElementById('editImageUrl').value,
                downloadUrl: document.getElementById('editDownloadUrl').value
            };
            saveData();
            renderAdminList();
            closeEditModal();
            showToast('✏️ Wallpaper updated');
        }
    };
    
    // Login system
    const ADMIN_PASSWORD = "Mahim@2030#";
    
    window.checkLogin = function() {
        const pwd = document.getElementById('adminPassword').value;
        if(pwd === ADMIN_PASSWORD) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadData();
            renderAdminList();
        } else {
            document.getElementById('loginError').innerText = 'Wrong password! Try:';
        }
    };
    
    window.logout = function() {
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerText = '';
    };
    
    // Initially load from storage
    loadData();
    
    // Check if already logged in from session? Not needed, start fresh
</script>
</body>
</html>
